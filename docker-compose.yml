services:
  smtp-server:
    build:
      context: .
      dockerfile: Dockerfile.smtp
    container_name: nomadnow-smtp
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - nomadnow-network

  nomadnow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL}
        EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY}
        EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${EXPO_PUBLIC_GOOGLE_CLIENT_ID}
        EXPO_PUBLIC_GOOGLE_CLIENT_SECRET: ${EXPO_PUBLIC_GOOGLE_CLIENT_SECRET}
        EXPO_PUBLIC_GOOGLE_REDIRECT_URI: ${EXPO_PUBLIC_GOOGLE_REDIRECT_URI}
        EXPO_PUBLIC_APP_NAME: ${EXPO_PUBLIC_APP_NAME:-NomadNow}
        EXPO_PUBLIC_APP_DOMAIN: ${EXPO_PUBLIC_APP_DOMAIN:-nomadnow.app}
        EXPO_PUBLIC_APP_VERSION: ${EXPO_PUBLIC_APP_VERSION:-1.0.0}
        EXPO_PUBLIC_SMTP_USER: ${EXPO_PUBLIC_SMTP_USER}
        EXPO_PUBLIC_SMTP_PASS: ${EXPO_PUBLIC_SMTP_PASS}
    container_name: nomadnow-prod
    restart: unless-stopped
    ports:
      - "19006:19006"
    env_file:
      - .env
    environment:
      # Production environment variables
      - NODE_ENV=production
      
      # Google OAuth configuration (set actual values)
      - EXPO_PUBLIC_GOOGLE_CLIENT_ID=${EXPO_PUBLIC_GOOGLE_CLIENT_ID}
      - EXPO_PUBLIC_GOOGLE_CLIENT_SECRET=${EXPO_PUBLIC_GOOGLE_CLIENT_SECRET}
      - EXPO_PUBLIC_GOOGLE_REDIRECT_URI=${EXPO_PUBLIC_GOOGLE_REDIRECT_URI}
      
      # Supabase configuration (set actual values)
      - EXPO_PUBLIC_SUPABASE_URL=${EXPO_PUBLIC_SUPABASE_URL}
      - EXPO_PUBLIC_SUPABASE_ANON_KEY=${EXPO_PUBLIC_SUPABASE_ANON_KEY}
      
      # App configuration
      - EXPO_PUBLIC_APP_NAME=NomadNow
      - EXPO_PUBLIC_APP_DOMAIN=${EXPO_PUBLIC_APP_DOMAIN:-nomadnow.app}
      - EXPO_PUBLIC_APP_VERSION=1.0.0
      
      # Email service configuration (set actual values)
      - EXPO_PUBLIC_RESEND_API_KEY=${EXPO_PUBLIC_RESEND_API_KEY}
      - EXPO_PUBLIC_RESEND_FROM=${EXPO_PUBLIC_RESEND_FROM}
      - EXPO_PUBLIC_FROM_NAME=${EXPO_PUBLIC_FROM_NAME}
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19006/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network configuration
    networks:
      - nomadnow-network

networks:
  nomadnow-network:
    driver: bridge
