services:
  nomadnow-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nomadnow:latest
    container_name: nomadnow-web
    restart: unless-stopped
    ports:
      - "19006:19006"
      - "8081:8081"
    environment:
      - NODE_ENV=development
      - EXPO_WEB_PORT=19006
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true
    networks:
      - nomadnow-network

networks:
  nomadnow-network:
    driver: bridge 