<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#6366f1" />
  
  <!-- Primary Meta Tags -->
  <title>NomadNow - Connect with Digital Nomads Worldwide</title>
  <meta name="title" content="NomadNow - Connect with Digital Nomads Worldwide" />
  <meta name="description" content="Discover the best cities for digital nomads, connect with fellow remote workers, and find your next destination. Join the global digital nomad community." />
  <meta name="keywords" content="digital nomad, remote work, travel, coworking, nomad cities, bali, chiang mai, lisbon, mexico city, porto, digital nomad community, remote workers, travel tips, nomad lifestyle" />
  <meta name="author" content="NomadNow" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="English" />
  <meta name="revisit-after" content="7 days" />
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://nomad.now/" />
  <meta property="og:title" content="NomadNow - Connect with Digital Nomads Worldwide" />

  <meta property="og:image" content="https://nomad.now/og-image.jpg" />
  <meta property="og:site_name" content="NomadNow" />
  <meta property="og:locale" content="en_US" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://nomad.now/" />
  <meta property="twitter:title" content="NomadNow - Connect with Digital Nomads Worldwide" />
  <meta property="twitter:description" content="Discover the best cities for digital nomads, connect with fellow remote workers, and find your next destination." />
  <meta property="twitter:image" content="https://nomad.now/twitter-image.jpg" />
  
  <!-- Additional Meta Tags -->
  <meta name="application-name" content="NomadNow" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="NomadNow" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-config" content="/browserconfig.xml" />
  <meta name="msapplication-TileColor" content="#6366f1" />
  <meta name="msapplication-tap-highlight" content="no" />
  
  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "NomadNow",
    "description": "Connect with digital nomads worldwide and discover the best cities for remote work",
    "url": "https://nomad.now",
    "applicationCategory": "SocialNetworkingApplication",
    "operatingSystem": "Web, iOS, Android",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "NomadNow",
      "url": "https://nomad.now"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.8",
      "ratingCount": "1250"
    }
  }
  </script>
  
  <!-- Preconnect to external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://images.unsplash.com" />
  
  <!-- Manifest -->
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  
  <!-- Favicon -->
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://nomad.now/" />
  
  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com" />
  <link rel="dns-prefetch" href="//images.unsplash.com" />
  
  <!-- Security Headers -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  
  <!-- Performance -->
  <link rel="preload" href="%PUBLIC_URL%/static/js/bundle.js" as="script" />
  <link rel="preload" href="%PUBLIC_URL%/static/css/main.css" as="style" />
</head>
<body>
  <noscript>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
      <h1>NomadNow</h1>
      <p>You need to enable JavaScript to run this app.</p>
      <p>NomadNow is a platform for digital nomads to connect and discover the best cities for remote work.</p>
      <p>Features include:</p>
      <ul style="text-align: left; max-width: 400px; margin: 0 auto;">
        <li>Discover nomad-friendly cities worldwide</li>
        <li>Connect with fellow digital nomads</li>
        <li>Find coworking spaces and meetups</li>
        <li>Get city insights and cost of living data</li>
        <li>Share experiences and tips</li>
      </ul>
    </div>
  </noscript>
  <div id="root"></div>
  
  <!-- Loading indicator -->
  <div id="loading" style="
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 9999;
  ">
    <div style="
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    "></div>
    <h1 style="margin: 0; font-size: 24px; font-weight: 600;">NomadNow</h1>
    <p style="margin: 10px 0 0 0; opacity: 0.8;">Connecting digital nomads worldwide...</p>
  </div>
  
  <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <script>
    // Hide loading indicator when app is ready
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.5s ease';
          setTimeout(function() {
            loading.style.display = 'none';
          }, 500);
        }
      }, 1000);
    });
    
    // Service Worker registration for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(function(registration) {
            console.log('SW registered: ', registration);
          })
          .catch(function(registrationError) {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
